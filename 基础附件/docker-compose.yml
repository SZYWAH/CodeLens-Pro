name: codelens-pro

services:
  mysql:
    image: mysql:8.0
    container_name: codelens-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-codelens_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-codelens_demo}
    ports:
      - "${MYSQL_PORT:-13307}:3306"
    volumes:
      - codelens_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: codelens-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-codelens_root_password}@mysql:3306/${MYSQL_DATABASE:-codelens_demo}?charset=utf8mb4
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_DEFAULT_MODEL: ${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}
      DEEPSEEK_DEFAULT_MODEL_LABEL: ${DEEPSEEK_DEFAULT_MODEL_LABEL:-dsV4flash}
      CODELENS_DEFAULT_LANGUAGE: ${CODELENS_DEFAULT_LANGUAGE:-Python}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: codelens-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-15173}:80"

volumes:
  codelens_mysql_data:
